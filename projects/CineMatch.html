<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch | Full View</title>
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #e50914; 
            --secondary: rgba(255, 255, 255, 0.4);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        nav {
            width: 280px;
            height: 100vh;
            position: fixed;
            padding: 40px;
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--bg);
            z-index: 100;
        }

        .back-btn { color: var(--accent); text-decoration: none; font-size: 0.9rem; margin-bottom: 30px; display: block; }
        
        .nav-group { display: flex; flex-direction: column; gap: 10px; }
        .nav-group h4 { font-size: 0.7rem; text-transform: uppercase; color: var(--secondary); letter-spacing: 1px; margin-bottom: 5px; }

        .toggle-btn {
            background: none;
            border: 1px solid var(--card-border);
            color: var(--secondary);
            padding: 12px;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover, .toggle-btn.active {
            border-color: var(--accent);
            color: var(--text);
            background: rgba(229, 9, 20, 0.05);
        }

        /* Content Area */
        main {
            margin-left: 280px;
            width: calc(100% - 280px);
            height: 100vh;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .view-section {
            display: none;
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        .view-section.active { display: flex; flex-direction: column; }

        header { margin-bottom: 20px; }
        h1 { font-size: 2rem; letter-spacing: -1px; }

        .content-frame {
            flex-grow: 1;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        @media (max-width: 900px) {
            nav { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--card-border); }
            main { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="projects.html" class="back-btn">← Back to Projects</a>
        
        <div class="nav-group">
            <h4>Select View</h4>
            <button class="toggle-btn active" id="btn-summary" onclick="switchView('summary')">Project Summary</button>
            <button class="toggle-btn" id="btn-code" onclick="switchView('code')"> Source Code (PDF)</button>
        </div>
    </nav>

    <main>
        <section id="summary-view" class="view-section active">
            <header>
                <h1>Project Report</h1>
                <p style="color: var(--secondary);">Technical Article: Hybrid Movie Recommendation Systems.</p>
            </header>
            <div class="content-frame">
                <iframe src="Final Project/CS463_Final_Project_Article_Template__Copy_.pdf"></iframe>
            </div>
        </section>

        <section id="code-view" class="view-section">
            <header>
                <h1>Source Code</h1>
                <p style="color: var(--secondary);">Full implementation of CineMatch.ipynb in PDF format.</p>
            </header>
            <div class="content-frame">
                <iframe src="Final Project/CineMatch.pdf"></iframe>
            </div>
        </section>
    </main>

    <script>
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));

            if (view === 'summary') {
                document.getElementById('summary-view').classList.add('active');
                document.getElementById('btn-summary').classList.add('active');
            } else {
                document.getElementById('code-view').classList.add('active');
                document.getElementById('btn-code').classList.add('active');
            }
        }
    </script>
</body>
</html>
