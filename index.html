<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Omyaa</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #007aff;
            --secondary: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center; /* Vertical center */
            justify-content: flex-end; /* Align container to the right */
        }

        /* Interactive Glow Background */
        #glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 122, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
        }

        /* Navigation Sidebar (Now on the Right) */
        .sidebar {
            padding-right: 10%; /* Space from the right edge */
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--secondary);
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 300;
            text-align: right; /* Text aligns to the right */
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            width: fit-content;
            align-self: flex-end; /* Ensures button width fits text and sticks right */
            letter-spacing: -1px;
            opacity: 0;
            transform: translateX(20px); /* Slide in from the right */
            animation: slideIn 0.8s forwards;
        }

        /* Staggered Animation */
        .nav-btn:nth-child(1) { animation-delay: 0.2s; }
        .nav-btn:nth-child(2) { animation-delay: 0.4s; }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Hover Effect */
        .nav-btn:hover {
            color: var(--text);
            transform: translateX(-10px); /* Move slightly left on hover */
        }

        /* The decorative line now appears on the right of the text */
        .nav-btn::after {
            content: '';
            position: absolute;
            right: -30px;
            top: 50%;
            width: 0px;
            height: 1px;
            background-color: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-btn:hover::after {
            width: 20px;
        }

        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <div id="glow"></div>

    <div class="sidebar">
        <button id = "projects", class = nav-btn>projects</button>
        <button class="nav-btn" id = "works">work experience</button>
    </div>

    <script>
        const glow = document.getElementById('glow');

        document.addEventListener('mousemove', (e) => {
            window.requestAnimationFrame(() => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
            });
        });

        const projects_btn = document.getElementById("projects")

        projects_btn.addEventListener("click", function(){
            window.location.href = ("projects.html")
        });

        const work_btn = document.getElementById("works")

        work_btn.addEventListener("click", function(){
            window.location.href = ("works.html")
        });

        function handleNav(destination) {
            console.log("Navigating to:", destination);
        }
    </script>
</body>
</html>
